<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - BKSysNet</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      /* Ẩn con mắt hiển thị mật khẩu mặc định của trình duyệt Edge/Windows */
      input[type="password"]::-ms-reveal,
      input[type="password"]::-ms-clear {
        display: none;
      }

      /* === Brand Header === */
      .brand-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 1.5rem;
        animation: fadeSlideDown 0.5s ease both;
      }

      .brand-logo {
        width: 56px;
        height: 56px;
        background: linear-gradient(135deg, #4f46e5, #818cf8);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 0.75rem;
        box-shadow: 0 8px 20px -4px rgba(79, 70, 229, 0.45);
        position: relative;
        overflow: hidden;
      }

      .brand-logo::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.2) 0%,
          transparent 60%
        );
        border-radius: inherit;
      }

      .brand-logo svg {
        position: relative;
        z-index: 1;
      }

      .brand-name {
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, #4f46e5 0%, #818cf8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin: 0;
        line-height: 1;
      }

      .brand-tagline {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: 0.3rem;
        letter-spacing: 0.5px;
        font-weight: 500;
      }

      @keyframes fadeSlideDown {
        from {
          opacity: 0;
          transform: translateY(-16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .container {
        animation: fadeSlideDown 0.55s ease 0.05s both;
      }
    </style>
  </head>
  <body>
    <!-- Brand Header -->
    <div class="brand-header">
      <div class="brand-logo">
        <svg
          width="28"
          height="28"
          viewBox="0 0 28 28"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <!-- Nodes -->
          <circle cx="14" cy="7" r="2.5" fill="white" />
          <circle cx="5" cy="21" r="2.5" fill="white" />
          <circle cx="23" cy="21" r="2.5" fill="white" />
          <circle cx="14" cy="15" r="2" fill="rgba(255,255,255,0.7)" />
          <!-- Edges -->
          <line
            x1="14"
            y1="7"
            x2="14"
            y2="15"
            stroke="white"
            stroke-width="1.4"
            stroke-opacity="0.7"
          />
          <line
            x1="5"
            y1="21"
            x2="14"
            y2="15"
            stroke="white"
            stroke-width="1.4"
            stroke-opacity="0.7"
          />
          <line
            x1="23"
            y1="21"
            x2="14"
            y2="15"
            stroke="white"
            stroke-width="1.4"
            stroke-opacity="0.7"
          />
          <line
            x1="5"
            y1="21"
            x2="14"
            y2="7"
            stroke="white"
            stroke-width="1"
            stroke-opacity="0.35"
            stroke-dasharray="2.5 2"
          />
          <line
            x1="23"
            y1="21"
            x2="14"
            y2="7"
            stroke="white"
            stroke-width="1"
            stroke-opacity="0.35"
            stroke-dasharray="2.5 2"
          />
        </svg>
      </div>
      <h1 class="brand-name">AsynapRous</h1>
      <span class="brand-tagline">Async · P2P · Decentralized Chat</span>
    </div>

    <div class="container">
      <h2>Welcome Back</h2>
      <p style="color: var(--text-muted); margin-bottom: 2rem">
        Sign in to continue
      </p>

      <form id="loginForm" method="POST" action="/login">
        <div class="form-group">
          <label>Username</label>
          <input
            name="username"
            type="text"
            placeholder="Enter your username"
            required
          />
        </div>

        <div class="form-group" style="position: relative">
          <label>Password</label>
          <input
            id="passwordInput"
            name="password"
            type="password"
            placeholder="Enter your password"
            required
            style="padding-right: 2.5rem"
          />
          <span
            id="togglePassword"
            style="
              position: absolute;
              right: 10px;
              top: 38px;
              cursor: pointer;
              color: var(--text-muted);
              user-select: none;
            "
            title="Hiện mật khẩu"
          >
            <svg
              id="eyeOpen"
              viewBox="0 0 24 24"
              width="20"
              height="20"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg
              id="eyeClosed"
              style="display: none"
              viewBox="0 0 24 24"
              width="20"
              height="20"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
              ></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </span>
        </div>

        <button type="submit" class="btn" style="margin-top: 1rem">
          Sign In
        </button>
      </form>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // Lấy tracker IP + port hiện tại từ URL
        const trackerIP = window.location.hostname; // ví dụ 127.0.0.1
        const trackerPort = window.location.port; // ví dụ 9000
        localStorage.setItem("trackerIP", trackerIP);
        localStorage.setItem("trackerPort", trackerPort);

        // Logic ẩn/hiện mật khẩu
        const togglePassword = document.getElementById("togglePassword");
        const passwordInput = document.getElementById("passwordInput");
        const eyeOpen = document.getElementById("eyeOpen");
        const eyeClosed = document.getElementById("eyeClosed");

        togglePassword.addEventListener("click", function () {
          const isPassword = passwordInput.getAttribute("type") === "password";
          passwordInput.setAttribute("type", isPassword ? "text" : "password");

          // Chuyển đổi SVG
          eyeOpen.style.display = isPassword ? "none" : "block";
          eyeClosed.style.display = isPassword ? "block" : "none";
          this.title = isPassword ? "Ẩn mật khẩu" : "Hiện mật khẩu";
        });
      });

      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const username = this.username.value;
          const password = this.password.value;

          // Lấy tracker IP + port từ localStorage
          const trackerIP = localStorage.getItem("trackerIP");
          const trackerPort = localStorage.getItem("trackerPort");

          fetch(`http://${trackerIP}:${trackerPort}/login`, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`,
          })
            .then((resp) =>
              resp.ok ? resp.text() : Promise.reject("Login failed"),
            )
            .then((html) => {
              // Nếu login thành công → redirect sang submit-info page
              window.location.href = `/`;
            })
            .catch((err) => alert(err));
        });
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Active Peers - BKSysNet</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/js/active-peers.js" defer></script>
  </head>
  <body>
    <nav style="position: fixed; top: 0; left: 0; width: 100%; padding: 1rem 2rem; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 100; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <h2 style="margin: 0; font-size: 1.5rem; color: var(--primary-color); letter-spacing: -0.5px;">BKSysNet P2P</h2>
            <div class="navbar-container" id="nav-user-badge">
                <img id="nav-avatar" src="" style="width: 24px; height: 24px; border-radius: 50%; display: none; box-shadow: 0 1px 2px rgba(0,0,0,0.1);" />
                <span style="display: flex; align-items: center;">Me: <span id="currentOwnerName" style="color: var(--primary-color); margin-left: 4px;">Guest</span><span class="online-dot" title="Online"></span></span>
            </div>
        </div>
        <button id="btn-logout" onmouseover="this.style.backgroundColor='#dc2626'; this.style.transform='translateY(-1px)'" onmouseout="this.style.backgroundColor='#ef4444'; this.style.transform='translateY(0)'" style="background-color: #ef4444; color: white; padding: 0.5rem 1.25rem; border: none; border-radius: 99px; cursor: pointer; font-weight: 600; font-size: 0.9rem; box-shadow: 0 4px 6px rgba(239, 68, 68, 0.2); transition: all 0.2s ease; display: flex; align-items: center; gap: 0.4rem;">
            <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            Sign Out
        </button>
    </nav>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const logoutBtn = document.getElementById("btn-logout");

        if (logoutBtn) {
          logoutBtn.addEventListener("click", async function () {
            if (!confirm("Are you sure you want to leave the P2P network?")) {
              return;
            }

            logoutBtn.innerText = "⏳ Signing out...";
            logoutBtn.disabled = true;

            try {
              // 1. [MỚI THÊM] Thông báo cho máy chủ Peer của mình để gửi "tin báo tử" cho mạng
              await fetch("/broadcast-logout", { method: "POST" });
              console.log("Đã thông báo cho mạng P2P");

              // 2. Báo cáo cho Tracker (sử dụng cổng động hoặc 9000 nếu chưa lưu)
              let trackerIP = "127.0.0.1";
              let trackerPort = "9000";
              try {
                const trRes = await fetch("/get-tracker");
                const trData = await trRes.json();
                if (trData.trackerIP) trackerIP = trData.trackerIP;
                if (trData.trackerPort) trackerPort = trData.trackerPort;
              } catch (err) { console.warn("Lỗi lấy tracker:", err); }

              await fetch(`http://${trackerIP}:${trackerPort}/logout`, {
                method: "POST",
                mode: "no-cors",
                credentials: "include",
              });
              console.log("Đã thông báo cho Tracker");
            } catch (error) {
              console.error("Lỗi trong quá trình đăng xuất:", error);
            } finally {
              // 3. Luôn luôn hủy Cookie và điều hướng dù có lỗi hay không
              document.cookie =
                "auth=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
              document.cookie =
                "username=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";

              // Đá văng về cổng của Lễ Tân Proxy (8888)
              window.location.href = "http://127.0.0.1:8888/login";
            }
          });
        }
      });
    </script>
    <!-- ========================================== -->
    <!-- KẾT THÚC: KHỐI NÚT ĐĂNG XUẤT               -->
    <!-- ========================================== -->

    <div class="container wide" style="max-width: 1200px; margin-top: 6rem;">
      <h2>Available Network Peers</h2>
      <p style="color: var(--text-muted)">
        List of peers registered in the tracker.
      </p>
      <div class="actions" style="margin-bottom: 1rem">
        <button class="btn" onclick="handleCreateGroup()">Create Group</button>
      </div>
      <table id="peerTable">
        <tr>
          <th>Username</th>
          <th>IP Address</th>
          <th>Port</th>
          <th>Network Action</th>
        </tr>
      </table>

      <div class="actions">
        <button
          class="btn btn-secondary"
          onclick="window.location.href = '/view-my-channels'"
        >
          View My Channels
        </button>
      </div>
    </div>

    <script>
      const _match = document.cookie.match(/username=([^;]+)/);
      const ownerNameElem = document.getElementById("currentOwnerName");
      if (ownerNameElem && _match) {
        const uname = _match[1];
        ownerNameElem.innerText = uname;
        const navAv = document.getElementById("nav-avatar");
        if (navAv) {
           navAv.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(uname)}&background=10b981&color=fff&rounded=true&bold=true`;
           navAv.style.display = "inline-block";
        }
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Active Peers - BKSysNet</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/js/active-peers.js" defer></script>
  </head>
  <body>
    <!-- Badge hiển thị Tên tài khoản đang đăng nhập -->
    <div
      style="
        position: absolute;
        top: 1.5rem;
        left: 1.5rem;
        background: rgba(255, 255, 255, 0.9);
        padding: 0.5rem 1rem;
        border-radius: 99px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--text-main);
        border: 1px solid var(--card-border);
        backdrop-filter: blur(5px);
        z-index: 99;
      "
    >
      👤 Web User:
      <span id="currentOwnerName" style="color: var(--primary-color)"
        >Khách</span
      >
    </div>
    <!-- ========================================== -->
    <!-- BẮT ĐẦU: KHỐI NÚT ĐĂNG XUẤT VÀ SCRIPT XỬ LÝ -->
    <!-- ========================================== -->
    <div style="position: absolute; top: 1.5rem; right: 1.5rem; z-index: 99">
      <button
        id="btn-logout"
        style="
          background-color: #ef4444;
          color: white;
          padding: 0.5rem 1rem;
          border: none;
          border-radius: 99px;
          cursor: pointer;
          font-weight: 600;
          box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
          transition: all 0.2s;
        "
      >
        🚪 Đăng xuất
      </button>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const logoutBtn = document.getElementById("btn-logout");

        if (logoutBtn) {
          logoutBtn.addEventListener("click", async function () {
            if (!confirm("Bạn có chắc chắn muốn rời khỏi mạng lưới P2P?")) {
              return;
            }

            logoutBtn.innerText = "⏳ Đang thoát...";
            logoutBtn.disabled = true;

            try {
              // 1. [MỚI THÊM] Thông báo cho máy chủ Peer của mình để gửi "tin báo tử" cho mạng
              await fetch("/broadcast-logout", { method: "POST" });
              console.log("Đã thông báo cho mạng P2P");

              // 2. Báo cáo cho Tracker (sử dụng cổng động hoặc 9000 nếu chưa lưu)
              let trackerIP = "127.0.0.1";
              let trackerPort = "9000";
              try {
                const trRes = await fetch("/get-tracker");
                const trData = await trRes.json();
                if (trData.trackerIP) trackerIP = trData.trackerIP;
                if (trData.trackerPort) trackerPort = trData.trackerPort;
              } catch (err) { console.warn("Lỗi lấy tracker:", err); }

              await fetch(`http://${trackerIP}:${trackerPort}/logout`, {
                method: "POST",
                mode: "no-cors",
                credentials: "include",
              });
              console.log("Đã thông báo cho Tracker");
            } catch (error) {
              console.error("Lỗi trong quá trình đăng xuất:", error);
            } finally {
              // 3. Luôn luôn hủy Cookie và điều hướng dù có lỗi hay không
              document.cookie =
                "auth=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
              document.cookie =
                "username=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";

              // Đá văng về cổng của Lễ Tân Proxy (8888)
              window.location.href = "http://127.0.0.1:8888/login";
            }
          });
        }
      });
    </script>
    <!-- ========================================== -->
    <!-- KẾT THÚC: KHỐI NÚT ĐĂNG XUẤT               -->
    <!-- ========================================== -->

    <div class="container wide">
      <h2>Available Network Peers</h2>
      <p style="color: var(--text-muted)">
        List of peers registered in the tracker.
      </p>
      <div class="actions" style="margin-bottom: 1rem">
        <button class="btn" onclick="handleCreateGroup()">Create Group</button>
      </div>
      <table id="peerTable">
        <tr>
          <th>Username</th>
          <th>IP Address</th>
          <th>Port</th>
          <th>Network Action</th>
        </tr>
      </table>

      <div class="actions">
        <button
          class="btn btn-secondary"
          onclick="window.location.href = '/view-my-channels'"
        >
          View My Channels
        </button>
      </div>
    </div>

    <script>
      const _match = document.cookie.match(/username=([^;]+)/);
      const ownerNameElem = document.getElementById("currentOwnerName");
      if (ownerNameElem)
        ownerNameElem.innerText = _match ? _match[1] : "Unknown";
    </script>
  </body>
</html>

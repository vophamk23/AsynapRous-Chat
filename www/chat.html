<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat with Peer - BKSysNet</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Badge hiển thị Tên chủ tài khoản đang đăng nhập, đặt ngoài khung chat -->
    <div
      style="
        position: absolute;
        top: 1.5rem;
        left: 1.5rem;
        background: rgba(255, 255, 255, 0.9);
        padding: 0.5rem 1rem;
        border-radius: 99px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--text-main);
        border: 1px solid var(--card-border);
        backdrop-filter: blur(5px);
      "
    >
      👤 Chủ chat:
      <span id="currentOwnerName" style="color: var(--primary-color)"
        >Tên bạn</span
      >
    </div>
    <!-- ========================================== -->
    <!-- BẮT ĐẦU: KHỐI NÚT ĐĂNG XUẤT VÀ SCRIPT XỬ LÝ -->
    <!-- ========================================== -->
    <div style="position: absolute; top: 1.5rem; right: 1.5rem; z-index: 99">
      <button
        id="btn-logout"
        style="
          background-color: #ef4444;
          color: white;
          padding: 0.5rem 1rem;
          border: none;
          border-radius: 99px;
          cursor: pointer;
          font-weight: 600;
          box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
          transition: all 0.2s;
        "
      >
        🚪 Đăng xuất
      </button>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const logoutBtn = document.getElementById("btn-logout");

        if (logoutBtn) {
          logoutBtn.addEventListener("click", async function () {
            if (!confirm("Bạn có chắc chắn muốn rời khỏi mạng lưới P2P?")) {
              return;
            }

            logoutBtn.innerText = "⏳ Đang thoát...";
            logoutBtn.disabled = true;

            try {
              // 1. [MỚI THÊM] Thông báo cho máy chủ Peer của mình để gửi "tin báo tử" cho mạng
              await fetch("/broadcast-logout", { method: "POST" });
              console.log("Đã thông báo cho mạng P2P");

              // 2. Báo cáo cho Tracker (sử dụng cổng động hoặc 9000 nếu chưa lưu)
              let trackerIP = "127.0.0.1";
              let trackerPort = "9000";
              try {
                const trRes = await fetch("/get-tracker");
                const trData = await trRes.json();
                if (trData.trackerIP) trackerIP = trData.trackerIP;
                if (trData.trackerPort) trackerPort = trData.trackerPort;
              } catch (err) { console.warn("Lỗi lấy tracker:", err); }

              await fetch(`http://${trackerIP}:${trackerPort}/logout`, {
                method: "POST",
                mode: "no-cors",
                credentials: "include",
              });
              console.log("Đã thông báo cho Tracker");
            } catch (error) {
              console.error("Lỗi trong quá trình đăng xuất:", error);
            } finally {
              // 3. Luôn luôn hủy Cookie và điều hướng dù có lỗi hay không
              document.cookie =
                "auth=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
              document.cookie =
                "username=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";

              // Đá văng về cổng của Lễ Tân Proxy (8888)
              window.location.href = "http://127.0.0.1:8888/login";
            }
          });
        }
      });
    </script>
    <!-- ========================================== -->
    <!-- KẾT THÚC: KHỐI NÚT ĐĂNG XUẤT               -->
    <!-- ========================================== -->

    <div class="container wide">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          border-bottom: 1px solid var(--card-border);
          padding-bottom: 1rem;
          margin-bottom: 1rem;
        "
      >
        <h2 style="margin: 0; color: var(--text-main)">Chat</h2>
        <span
          style="
            font-weight: 600;
            color: var(--primary-color);
            background: rgba(79, 70, 229, 0.1);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
          "
          id="peerName"
          >Peer</span
        >
      </div>

      <div id="chat-wrapper">
        <div id="messages"></div>

        <div id="input-area">
          <input
            id="message-input"
            type="text"
            placeholder="Type your message here..."
          />
          <button id="send-btn" class="btn">Send</button>
        </div>
      </div>

      <div class="actions" style="margin-top: 1.5rem">
        <button
          class="btn btn-secondary"
          onclick="window.location.href = '/view-my-channels'"
        >
          Back to Channels
        </button>
      </div>
    </div>

    <script src="chat.js"></script>
  </body>
</html>

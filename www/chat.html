<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat with Peer - BKSysNet</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <nav style="position: fixed; top: 0; left: 0; width: 100%; padding: 1rem 2rem; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); z-index: 100; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <h2 style="margin: 0; font-size: 1.5rem; color: var(--primary-color); letter-spacing: -0.5px;">BKSysNet P2P</h2>
            <div class="navbar-container" id="nav-user-badge">
              <img id="nav-avatar" src="" style="width: 24px; height: 24px; border-radius: 50%; display: none; box-shadow: 0 1px 2px rgba(0,0,0,0.1);" />
              <span style="display: flex; align-items: center;">Me: <span id="currentOwnerName" style="color: var(--primary-color); margin-left: 4px;">Guest</span><span class="online-dot" title="Online"></span></span>
            </div>
        </div>
        <button id="btn-logout" onmouseover="this.style.backgroundColor='#dc2626'; this.style.transform='translateY(-1px)'" onmouseout="this.style.backgroundColor='#ef4444'; this.style.transform='translateY(0)'" style="background-color: #ef4444; color: white; padding: 0.5rem 1.25rem; border: none; border-radius: 99px; cursor: pointer; font-weight: 600; font-size: 0.9rem; box-shadow: 0 4px 6px rgba(239, 68, 68, 0.2); transition: all 0.2s ease; display: flex; align-items: center; gap: 0.4rem;">
            <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            Sign Out
        </button>
    </nav>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const _match = document.cookie.match(/username=([^;]+)/);
        const ownerNameElem = document.getElementById("currentOwnerName");
        if (ownerNameElem && _match) {
          const uname = _match[1];
          ownerNameElem.innerText = uname;
          const navAv = document.getElementById("nav-avatar");
          if (navAv) {
             navAv.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(uname)}&background=10b981&color=fff&rounded=true&bold=true`;
             navAv.style.display = "inline-block";
          }
        }
        const logoutBtn = document.getElementById("btn-logout");

        if (logoutBtn) {
          logoutBtn.addEventListener("click", async function () {
            if (!confirm("Are you sure you want to leave the P2P network?")) {
              return;
            }

            logoutBtn.innerText = "⏳ Signing out...";
            logoutBtn.disabled = true;

            try {
              // 1. [MỚI THÊM] Thông báo cho máy chủ Peer của mình để gửi "tin báo tử" cho mạng
              await fetch("/broadcast-logout", { method: "POST" });
              console.log("Đã thông báo cho mạng P2P");

              // 2. Báo cáo cho Tracker (sử dụng cổng động hoặc 9000 nếu chưa lưu)
              let trackerIP = "127.0.0.1";
              let trackerPort = "9000";
              try {
                const trRes = await fetch("/get-tracker");
                const trData = await trRes.json();
                if (trData.trackerIP) trackerIP = trData.trackerIP;
                if (trData.trackerPort) trackerPort = trData.trackerPort;
              } catch (err) {
                console.warn("Lỗi lấy tracker:", err);
              }

              await fetch(`http://${trackerIP}:${trackerPort}/logout`, {
                method: "POST",
                mode: "no-cors",
                credentials: "include",
              });
              console.log("Đã thông báo cho Tracker");
            } catch (error) {
              console.error("Lỗi trong quá trình đăng xuất:", error);
            } finally {
              // 3. Luôn luôn hủy Cookie và điều hướng dù có lỗi hay không
              document.cookie =
                "auth=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
              document.cookie =
                "username=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";

              // Đá văng về cổng của Lễ Tân Proxy (8888)
              window.location.href = "http://127.0.0.1:8888/login";
            }
          });
        }
      });
    </script>
    <!-- ========================================== -->
    <!-- KẾT THÚC: KHỐI NÚT ĐĂNG XUẤT               -->
    <!-- ========================================== -->

    <div
      class="container wide"
      style="
        max-width: 1000px;
        margin-top: 6rem;
        display: flex;
        flex-direction: row;
        padding: 0;
        overflow: hidden;
        height: 600px;
        gap: 0;
      "
    >
      <!-- Cột trái: Sidebar (Danh sách chat) -->
      <div
        id="chat-sidebar"
        style="
          width: 300px;
          min-width: 280px;
          border-right: 1px solid var(--card-border);
          background: rgba(0, 0, 0, 0.02);
          display: flex;
          flex-direction: column;
        "
      >
        <div
          style="
            padding: 1.5rem;
            border-bottom: 1px solid var(--card-border);
            background: var(--card-bg);
          "
        >
          <h3 style="margin: 0; color: var(--text-main)">Conversations</h3>
        </div>
        <div
          id="sidebar-list"
          style="
            flex-grow: 1;
            overflow-y: auto;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
          "
        >
          <div
            style="
              text-align: center;
              color: var(--text-muted);
              font-size: 0.85rem;
              padding: 1rem;
            "
          >
            Loading...
          </div>
        </div>
        <div
          style="
            padding: 1rem;
            border-top: 1px solid var(--card-border);
            text-align: center;
          "
        >
          <button
            class="btn btn-secondary"
            style="width: 100%; font-size: 0.85rem"
            onclick="window.location.href = '/view-my-channels'"
          >
            🔙 Manage Channels
          </button>
        </div>
      </div>

      <!-- Cột phải: Chat Box -->
      <div
        style="
          flex-grow: 1;
          display: flex;
          flex-direction: column;
          padding: 1.5rem;
          background: var(--card-bg);
        "
      >
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
          "
        >
          <h2 style="margin: 0; color: var(--text-main)">Chat</h2>
          <div style="display: flex; align-items: center; gap: 0.5rem;" id="chat-header-actions">
            <span
              style="
                font-weight: 600;
                color: var(--primary-color);
                background: rgba(79, 70, 229, 0.1);
                padding: 0.25rem 0.75rem;
                border-radius: 9999px;
              "
              id="peerName"
              >Select a chat</span
            >
            <!-- Nút xem thành viên, mặc định ẩn -->
            <button id="btn-view-members" class="btn btn-secondary" style="display: none; padding: 0.25rem 0.75rem; font-size: 0.85rem;">👥 Members</button>
          </div>
        </div>

        <div id="chat-wrapper" style="flex-grow: 1; min-height: 0; height: auto;">
          <div id="messages"></div>

          <div id="input-area">
            <input
              id="message-input"
              type="text"
              placeholder="Type a message..."
            />
            <button id="send-btn" class="btn">Send</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Popup modal xem danh sách thành viên -->
    <div id="members-modal" class="modal-overlay" style="display:none; justify-content: center; align-items: center; z-index: 9999;">
      <div class="modal-content" style="padding: 2.5rem; text-align: left; max-width: 400px; width: 100%;">
        <h3 id="members-modal-title" style="margin-bottom: 1rem; text-align: center; color: var(--text-main);">Group Members</h3>
        <ul id="members-list" style="list-style: none; padding: 0; margin-bottom: 1.5rem; max-height: 250px; overflow-y: auto; border: 1px solid var(--card-border); border-radius: 8px; background: rgba(0,0,0,0.02);">
            <!-- Thành viên sẽ được load vào đây -->
        </ul>
        <div class="modal-actions" style="justify-content: center;">
          <button class="btn btn-secondary" onclick="document.getElementById('members-modal').style.display='none'" style="width: 100%;">Close</button>
        </div>
      </div>
    </div>

    <script src="chat.js"></script>
  </body>
</html>

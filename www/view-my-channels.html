<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Channels - BKSysNet</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Badge hiển thị Tên tài khoản đang đăng nhập -->
    <div
      style="
        position: absolute;
        top: 1.5rem;
        left: 1.5rem;
        background: rgba(255, 255, 255, 0.9);
        padding: 0.5rem 1rem;
        border-radius: 99px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--text-main);
        border: 1px solid var(--card-border);
        backdrop-filter: blur(5px);
        z-index: 99;
      "
    >
      👤 Web User:
      <span id="currentOwnerName" style="color: var(--primary-color)"
        >Khách</span
      >
    </div>
    <!-- ========================================== -->
    <!-- BẮT ĐẦU: KHỐI NÚT ĐĂNG XUẤT VÀ SCRIPT XỬ LÝ -->
    <!-- ========================================== -->
    <div style="position: absolute; top: 1.5rem; right: 1.5rem; z-index: 99">
      <button
        id="btn-logout"
        style="
          background-color: #ef4444;
          color: white;
          padding: 0.5rem 1rem;
          border: none;
          border-radius: 99px;
          cursor: pointer;
          font-weight: 600;
          box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
          transition: all 0.2s;
        "
      >
        🚪 Đăng xuất
      </button>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const logoutBtn = document.getElementById("btn-logout");

        if (logoutBtn) {
          logoutBtn.addEventListener("click", async function () {
            if (!confirm("Bạn có chắc chắn muốn rời khỏi mạng lưới P2P?")) {
              return;
            }

            logoutBtn.innerText = "⏳ Đang thoát...";
            logoutBtn.disabled = true;

            try {
                // 1. [MỚI THÊM] Thông báo cho máy chủ Peer của mình để gửi "tin báo tử" cho mạng
                await fetch("/broadcast-logout", { method: "POST" });
                console.log("Đã thông báo cho mạng P2P");

                // 2. Báo cáo cho Tracker (sử dụng cổng động hoặc 9000 nếu chưa lưu)
                const trackerIP = localStorage.getItem("trackerIP") || "127.0.0.1";
                const trackerPort = localStorage.getItem("trackerPort") || "9000";

                await fetch(`http://${trackerIP}:${trackerPort}/logout`, {
                    method: "POST",
                    mode: "no-cors",
                    credentials: "include",
                });
                console.log("Đã thông báo cho Tracker");

            } catch (error) {
                console.error("Lỗi trong quá trình đăng xuất:", error);
            } finally {
                // 3. Luôn luôn hủy Cookie và điều hướng dù có lỗi hay không
                document.cookie = "auth=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                document.cookie = "username=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                
                // Đá văng về cổng của Lễ Tân Proxy (8888)
                window.location.href = "http://127.0.0.1:8888/login";
            }
          });
        }
      });
    </script>
    <!-- ========================================== -->
    <!-- KẾT THÚC: KHỐI NÚT ĐĂNG XUẤT               -->
    <!-- ========================================== -->

    <div class="container wide">
      <h2>My Connected Channels</h2>
      <p style="color: var(--text-muted)">
        Manage your active peer-to-peer connections.
      </p>

      <table id="channelsTable">
        <tr>
          <th>Username</th>
          <th>Network IP</th>
          <th>Port Details</th>
          <th>Communication</th>
        </tr>
      </table>

      <h3 style="margin-top: 2rem;">My Groups</h3>
      <p style="color: var(--text-muted)">
        The chat groups you are participating in.
      </p>
      <table id="groupsTable">
        <tr>
          <th>Group Name</th>
          <th>Owner</th>
          <th>Action</th>
        </tr>
      </table>

      <div class="actions">
        <button
          id="activeBtn"
          class="btn btn-secondary"
          onclick="goActivePeers()"
        >
          Browse Active Peers
        </button>
        <button id="broadcast-btn" class="btn">Broadcast to All</button>
      </div>
    </div>

    <!-- Popup modal broadcast -->
    <div id="broadcast-modal" class="modal-overlay">
      <div class="modal-content">
        <h3 style="margin-bottom: 1rem">Broadcast Message</h3>
        <p
          style="
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
          "
        >
          Gửi tin nhắn này đồng thời tới toàn bộ các Peer đã kết nối.
        </p>
        <textarea
          id="broadcast-input"
          placeholder="Enter your global message..."
        ></textarea>
        <div class="modal-actions">
          <button id="close-broadcast-btn" class="btn btn-secondary">
            Cancel
          </button>
          <button id="send-broadcast-btn" class="btn">Broadcast Now</button>
        </div>
      </div>
    </div>

    <script>
      // --- Render danh sách channel ---
      async function getConnectedPeers() {
        try {
          const res = await fetch("/get-connected-peer");
          const data = await res.json(); // parse JSON → trả về object/dict
          console.log(data.peer_list); // đây là dict bạn cần lấy
          return data.peer_list;
        } catch (err) {
          console.error("Error fetching peers:", err);
          return {};
        }
      }
      async function renderChannels() {
        try {
          const savedPeers = await getConnectedPeers();
          const table = document.getElementById("channelsTable");

          // Clear table, giữ header
          table.innerHTML = `
            <tr>
                <th>Username</th>
                <th>IP</th>
                <th>Port</th>
                <th>Action</th>
            </tr>
        `;

          if (Object.keys(savedPeers).length === 0) {
            table.innerHTML +=
              "<tr><td colspan='4'>No connected channels yet!</td></tr>";
            return;
          }

          Object.keys(savedPeers).forEach((peer) => {
            console.log(peer);
            const row = table.insertRow();
            row.insertCell().innerText = peer;
            row.insertCell().innerText = savedPeers[peer][0];
            row.insertCell().innerText = savedPeers[peer][1];

            const chatBtn = document.createElement("button");
            chatBtn.innerText = "Open Chat";
            chatBtn.onclick = () => {
              window.location.href = `/chat?peer=${peer}&ip=${savedPeers[peer][0]}&port=${savedPeers[peer][1]}`;
            };
            row.insertCell().appendChild(chatBtn);
          });
        } catch (err) {
          console.error("Error fetching peers:", err);
          return {};
        }
      }

      // --- Render danh sách Group ---
      // --- Render danh sách Group ---
      async function renderGroups() {
        const trackerIP = localStorage.getItem("trackerIP") || "127.0.0.1";
        const trackerPort = localStorage.getItem("trackerPort") || "9000"; 
        const currentUsername = getUsername();

        try {
          const res = await fetch(`http://${trackerIP}:${trackerPort}/my-groups?username=${encodeURIComponent(currentUsername)}`);
          const data = await res.json();
          
          const table = document.getElementById("groupsTable");
          table.innerHTML = `<tr><th>Group Name</th><th>Owner</th><th>Action</th></tr>`;
          
          if (data.status === "success" && data.groups && data.groups.length > 0) {
            data.groups.forEach(g => {
              const row = table.insertRow();
              row.insertCell().innerText = g.group_name;
              
              const isOwner = g.owner === currentUsername;
              const ownerText = isOwner ? `👑 ${g.owner} (Bạn)` : `👤 ${g.owner}`;
              row.insertCell().innerText = ownerText;
              
              // Cột Action chứa các nút bấm
              const actionCell = row.insertCell();
              
              // Nút 1: Mở chat (Ai cũng có)
              const chatBtn = document.createElement("button");
              chatBtn.innerText = "Open Chat";
              chatBtn.className = "btn"; // Thêm class cho đẹp
              chatBtn.onclick = () => {
                window.location.href = `/chat?group_name=${encodeURIComponent(g.group_name)}`;
              };
              actionCell.appendChild(chatBtn);

              // Nút 2: Thêm người (CHỈ TRƯỞNG NHÓM MỚI CÓ)
              if (isOwner) {
                const addBtn = document.createElement("button");
                addBtn.innerText = "➕ Add Member";
                addBtn.className = "btn btn-secondary"; 
                addBtn.style.marginLeft = "10px"; // Cách ra một chút cho đẹp
                addBtn.onclick = () => inviteToGroup(g.group_name); // Gọi hàm mời
                actionCell.appendChild(addBtn);
              }
            });
          } else {
            table.innerHTML += "<tr><td colspan='3' style='text-align:center;'>You haven't joined any groups yet!</td></tr>";
          }
        } catch (err) {
          console.error("Lỗi tải danh sách nhóm:", err);
        }
      }

      // --- Logic Trưởng nhóm nạp thêm người (Gọi từ bảng) ---
      async function inviteToGroup(groupName) {
          const targetUser = prompt(`Nhập Username của người bạn muốn mời vào nhóm '${groupName}':`);
          if (!targetUser) return;

          const currentUsername = getUsername();
          const trackerIP = localStorage.getItem("trackerIP") || "127.0.0.1";
          const trackerPort = localStorage.getItem("trackerPort") || "9000";

          try {
              const resp = await fetch(`http://${trackerIP}:${trackerPort}/add-to-group`, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ 
                      group_name: groupName, 
                      target_user: targetUser,
                      username: currentUsername 
                  })
              });
              const data = await resp.json();
              
              if (resp.ok) {
                  alert("Thành công: " + data.message);
              } else {
                  alert("Lỗi: " + data.message); 
              }
          } catch (err) {
              console.error("Lỗi khi thêm thành viên:", err);
              alert("Lỗi khi kết nối đến Tracker.");
          }
      }

      // --- Chuyển tới trang active peers ---
      function goActivePeers() {
        window.location.href = "/active-peers";
      }

      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("currentOwnerName").innerText = getUsername();
        renderChannels();
        renderGroups();
      });

      // --- Popup broadcast ---
      const broadcastBtn = document.getElementById("broadcast-btn");
      const broadcastModal = document.getElementById("broadcast-modal");
      const closeBroadcastBtn = document.getElementById("close-broadcast-btn");
      const sendBroadcastBtn = document.getElementById("send-broadcast-btn");
      const broadcastInput = document.getElementById("broadcast-input");

      broadcastBtn.onclick = () => (broadcastModal.style.display = "flex");
      closeBroadcastBtn.onclick = () => (broadcastModal.style.display = "none");

      // --- Lấy username từ cookie ---
      function getUsername() {
        const match = document.cookie.match(/username=([^;]+)/);
        return match ? match[1] : "Unknown";
      }

      // --- Lưu message vào server local ---
      async function saveMessage(receiver, text, time_stamp) {
        if (!receiver || !text || !time_stamp) {
          console.log("Missing info.");
          return;
        }
        try {
          await fetch(`/send-message`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              receiver: receiver,
              message: text,
              time_stamp: time_stamp,
            }),
          });
          // appendMessage(username, text);
        } catch (err) {
          appendMessage("System", "Failed to send message to peer.");
        }
      }

      // --- Gửi broadcast tới tất cả peer ---
      sendBroadcastBtn.onclick = async () => {
        const text = broadcastInput.value.trim();
        if (!text) return;

        const savedPeers = await getConnectedPeers();
        const username = getUsername();
        const now = new Date().toISOString();

        // Lưu broadcast vào server local cho chính mình

        // Gửi tới tất cả peer
        Object.keys(savedPeers).forEach(async (peer) => {
          peer_ip = savedPeers[peer][0];
          peer_port = savedPeers[peer][1];
          try {
            await fetch(`http://${peer_ip}:${peer_port}/receive-message`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                sender: username,
                message: text,
                time_stamp: now,
              }),
            });
          } catch (err) {
            console.warn(`Failed to send to ${peer}:`, err);
          }
          saveMessage(peer, text, now);
        });

        alert("Broadcast sent!");
        broadcastInput.value = "";
        broadcastModal.style.display = "none";
      };

      // --- Mở khung chat nhóm ---
      function openGroupChat() {
          const groupName = prompt("Nhập tên nhóm bạn muốn mở:");
          if (groupName) {
              window.location.href = `/chat?group_name=${encodeURIComponent(groupName)}`;
          }
      }
    </script>
  </body>
</html>
